<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#1e3a8a"/>
<meta name="description" content="منظومة الكابتن سعيد - إدارة الحركات المالية"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ك.سعيد"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" href="icon-192.png"/>
<title>منظومة الكابتن سعيد</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --border: #94a3b8;
  --border-dark: #334155;
  --text: #0f172a;
  --text-muted: #475569;
  --accent: #f59e0b;
  --accent-dark: #d97706;
  --primary: #1e40af;
  --primary-light: #3b82f6;
  --danger: #dc2626;
  --success: #16a34a;
  --hover-row: #fef9c3;
  --total-bg: #1e293b;
  --total-text: #f59e0b;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --radius: 12px;
  --th-bg: #e2e8f0;
  --header-bg: #1e3a8a;
  --header-text: #ffffff;
  --input-bg: #ffffff;
  --modal-bg: #ffffff;
  --grand-bg: #e8edf5;
  --mark-bg: #fef3c7;
  --stat-bg: #dbeafe;
}
[data-theme="dark"] {
  --bg: #0a0f1e;
  --surface: #111827;
  --surface2: #1e293b;
  --border: #334155;
  --border-dark: #475569;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --accent: #fbbf24;
  --accent-dark: #f59e0b;
  --primary: #3b82f6;
  --primary-light: #60a5fa;
  --danger: #ef4444;
  --success: #22c55e;
  --hover-row: #1e3a5f;
  --total-bg: #0f172a;
  --total-text: #fbbf24;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --th-bg: #1e293b;
  --header-bg: #0f172a;
  --header-text: #fbbf24;
  --input-bg: #1e293b;
  --modal-bg: #1e293b;
  --grand-bg: #0f172a;
  --mark-bg: #422006;
  --stat-bg: #1e3a5f;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",Cairo,Arial,sans-serif;transition:background-color .3s,color .3s,border-color .3s;}
body{background:var(--bg);color:var(--text);min-height:100vh;scroll-behavior:smooth;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--surface2);}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px;}

/* ===== LOGIN PAGE ===== */
#login-page{
  position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;z-index:9999;
  background:linear-gradient(135deg,#0d47a1 0%,#0a0f1e 50%,#1a0533 100%);
}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;width:2px;height:2px;background:white;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:1;transform:scale(1.5);}}
.login-card{
  background:rgba(255,255,255,.07);padding:40px 35px;border-radius:24px;
  text-align:center;width:min(360px,92vw);
  backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.app-title{color:#fbbf24;font-size:clamp(20px,5vw,28px);font-weight:900;margin-bottom:6px;letter-spacing:1px;}
.app-sub{color:#94a3b8;font-size:13px;margin-bottom:25px;}
.analog-clock{
  width:clamp(160px,40vw,200px);height:clamp(160px,40vw,200px);
  background:rgba(255,255,255,.95);border:8px solid #fbbf24;
  border-radius:50%;position:relative;margin:0 auto 28px;
  box-shadow:0 0 40px rgba(251,191,36,.4),inset 0 2px 10px rgba(0,0,0,.1);
}
.clock-num{position:absolute;font-weight:900;font-size:clamp(14px,3vw,18px);color:#1e293b;}
.n12{top:8px;left:50%;transform:translateX(-50%);}
.n3{right:8px;top:50%;transform:translateY(-50%);}
.n6{bottom:8px;left:50%;transform:translateX(-50%);}
.n9{left:8px;top:50%;transform:translateY(-50%);}
.clock-dot{position:absolute;width:10px;height:10px;background:#1e293b;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;}
.hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;border-radius:6px 6px 0 0;}
.hour{width:6px;height:50px;background:#1e293b;margin-left:-3px;}
.min{width:4px;height:68px;background:#334155;margin-left:-2px;}
.sec{width:2px;height:78px;background:#dc2626;margin-left:-1px;}
.clock-time{color:#94a3b8;font-size:13px;margin-bottom:18px;letter-spacing:2px;}
.profile-ring{
  width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,#fbbf24,#d97706,#fbbf24);
  padding:4px;margin:0 auto 14px;
  box-shadow:0 0 30px rgba(251,191,36,.5),0 0 60px rgba(251,191,36,.2);
  animation:pulse-gold 2.5s ease-in-out infinite;
}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 25px rgba(251,191,36,.4);}50%{box-shadow:0 0 45px rgba(251,191,36,.7),0 0 80px rgba(251,191,36,.25);}}
.profile-ring img{
  width:100%;height:100%;border-radius:50%;
  object-fit:cover;object-position:center top;
  border:3px solid #0f172a;
  display:block;
}
.clock-row{display:flex;align-items:center;justify-content:center;gap:16px;margin:14px 0 16px;}
.header-avatar{
  width:36px;height:36px;border-radius:50%;
  border:2px solid #fbbf24;object-fit:cover;object-position:center top;
  flex-shrink:0;
}
#passInput{
  width:100%;padding:14px;border-radius:10px;border:2px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);color:#fff;text-align:center;font-size:18px;
  outline:none;letter-spacing:4px;
}
#passInput::placeholder{color:rgba(255,255,255,.4);letter-spacing:1px;}
#passInput:focus{border-color:#fbbf24;box-shadow:0 0 0 3px rgba(251,191,36,.2);}
.btn-login{
  width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);
  color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:900;
  cursor:pointer;transition:all .2s;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,158,11,.4);}
.btn-login:active{transform:translateY(0);}

/* ===== HEADER ===== */
#main-app{display:none;}
.app-header{
  background:var(--header-bg);color:var(--header-text);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:1100;
  box-shadow:0 2px 20px rgba(0,0,0,.3);
}
.header-title{font-size:clamp(16px,4vw,22px);font-weight:900;color:#fbbf24;white-space:nowrap;}
.header-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.hbtn{
  padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);color:white;cursor:pointer;font-size:13px;
  font-weight:700;transition:all .2s;white-space:nowrap;
}
.hbtn:hover{background:rgba(255,255,255,.2);}
.hbtn.active{background:#f59e0b;color:#000;border-color:#f59e0b;}

/* ===== LAYOUT ===== */
.app-body{padding:clamp(8px,2vw,20px);max-width:1400px;margin:auto;}

/* ===== SEARCH BAR ===== */
.search-section{
  background:var(--surface);border-radius:var(--radius);
  padding:14px;margin-bottom:14px;border:1px solid var(--border);
  box-shadow:var(--shadow);
}
.search-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-row input{
  flex:1;min-width:120px;padding:10px 14px;border-radius:8px;
  border:2px solid var(--border);background:var(--input-bg);color:var(--text);
  font-size:14px;font-weight:600;outline:none;
}
.search-row input:focus{border-color:var(--primary);}
.btn{
  padding:10px 16px;border-radius:8px;border:none;cursor:pointer;
  font-size:14px;font-weight:900;transition:all .2s;white-space:nowrap;color:white;
}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-green{background:linear-gradient(135deg,#16a34a,#15803d);}
.btn-blue{background:linear-gradient(135deg,#1d4ed8,#1e40af);}
.btn-red{background:linear-gradient(135deg,#dc2626,#b91c1c);}
.btn-orange{background:linear-gradient(135deg,#ea580c,#c2410c);}
.btn-teal{background:linear-gradient(135deg,#0d9488,#0f766e);}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#6d28d9);}
.btn-yellow{background:linear-gradient(135deg,#d97706,#b45309);color:#fff;}
.btn-gray{background:linear-gradient(135deg,#475569,#334155);}
.btn-sm{padding:6px 10px;font-size:12px;}
.archive-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.arch-item{
  display:flex;align-items:center;gap:6px;
  background:var(--primary);color:white;
  padding:7px 12px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:700;border:1px solid transparent;
  transition:all .2s;
}
.arch-item:hover{background:var(--primary-light);transform:translateY(-1px);}
.arch-item .arch-date{font-size:10px;color:rgba(255,255,255,.6);display:block;}
.arch-del{
  background:rgba(255,255,255,.2);border:none;color:white;
  width:18px;height:18px;border-radius:50%;cursor:pointer;
  font-size:11px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s;
}
.arch-del:hover{background:rgba(220,38,38,.8);}

/* ===== ENTRY FORM ===== */
.entry-section{
  background:var(--surface);border-radius:var(--radius);
  padding:20px 16px 14px;margin-bottom:14px;
  border:1px solid var(--border);box-shadow:var(--shadow);
}
.entry-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:14px;margin-bottom:12px;
}
.field{position:relative;}
.field label{
  position:absolute;top:-10px;right:10px;
  background:var(--surface);padding:0 6px;
  font-size:12px;font-weight:700;color:var(--primary);
  white-space:nowrap;
}
.field input{
  width:100%;padding:12px 8px;border-radius:8px;
  border:2px solid var(--border);background:var(--input-bg);
  color:var(--text);text-align:center;font-size:16px;font-weight:900;
  outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,64,175,.15);}
.field input[readonly]{background:var(--surface2);color:var(--text-muted);cursor:default;}
.entry-btns{display:flex;gap:8px;flex-wrap:wrap;}

/* ===== TABLE SECTION ===== */
.table-section{
  background:var(--surface);border-radius:var(--radius);
  margin-bottom:14px;border:1px solid var(--border);
  box-shadow:var(--shadow);overflow:hidden;
}
.table-toolbar{
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.table-title{font-size:16px;font-weight:900;color:var(--text);}
.table-filter{
  padding:8px 12px;border-radius:8px;border:2px solid var(--border);
  background:var(--input-bg);color:var(--text);font-size:13px;
  outline:none;width:min(200px,100%);
}
.table-filter:focus{border-color:var(--primary);}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:580px;}
th{
  background:var(--th-bg);color:var(--text);
  padding:clamp(8px,1.5vw,14px) clamp(4px,1vw,8px);
  font-size:clamp(13px,1.8vw,16px);font-weight:900;
  border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10;
}
td{
  padding:clamp(8px,1.5vw,12px) clamp(4px,1vw,8px);
  text-align:center;font-size:clamp(14px,1.8vw,16px);font-weight:700;
  border-bottom:1px solid var(--border);color:var(--text);
}
tbody tr:hover{background:var(--hover-row)!important;}
tbody tr.marked{background:var(--mark-bg)!important;}
.num-cell{background:var(--surface2);color:var(--text-muted);font-size:13px;font-weight:900;}
.cell-edit{outline:none;min-width:40px;}
.row-actions{display:flex;gap:4px;justify-content:center;}
.row-btn{
  background:none;border:none;cursor:pointer;padding:4px 6px;
  border-radius:6px;font-size:14px;transition:background .2s;
}
.row-btn:hover{background:var(--surface2);}
.total-row td{
  background:var(--total-bg)!important;color:var(--total-text)!important;
  font-size:clamp(14px,2vw,17px);font-weight:900;
  border-top:3px solid var(--accent);
}
.hidden-row{display:none;}

/* ===== STATS ===== */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;margin-bottom:14px;
}
.stat-card{
  background:var(--stat-bg);border-radius:var(--radius);
  padding:16px;text-align:center;border:1px solid var(--border);
}
.stat-num{font-size:clamp(22px,4vw,32px);font-weight:900;color:var(--primary);}
[data-theme="dark"] .stat-num{color:var(--accent);}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:700;margin-top:4px;}

/* ===== GRAND TOTAL ===== */
.grand-section{
  background:var(--grand-bg);border-radius:var(--radius);
  padding:20px;margin-bottom:14px;border:2px solid var(--accent);
}
.grand-title{
  text-align:center;font-size:18px;font-weight:900;
  color:var(--accent);margin-bottom:16px;
  border-bottom:2px solid var(--border);padding-bottom:10px;
}
.grand-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;}
.grand-box{text-align:center;}
.grand-box label{display:block;font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;}
.grand-box .grand-val{
  width:100%;padding:12px;text-align:center;font-weight:900;
  font-size:clamp(18px,3vw,22px);border:2px solid var(--border);border-radius:8px;
  background:var(--surface);color:var(--danger);
  display:block;
}

/* ===== ACTION BUTTONS ===== */
.action-bar{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;
  justify-content:center;
}

/* ===== MODALS ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:10000;justify-content:center;align-items:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--modal-bg);padding:30px;border-radius:20px;
  text-align:center;width:min(380px,92vw);max-height:90vh;overflow-y:auto;
  border:2px solid var(--primary);box-shadow:0 20px 60px rgba(0,0,0,.4);
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.modal h3{margin-bottom:18px;color:var(--primary);font-size:18px;font-weight:900;}
.modal-btns{display:flex;flex-direction:column;gap:8px;margin-top:12px;}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:white;padding:12px 24px;border-radius:30px;
  font-weight:700;z-index:20000;opacity:0;transition:opacity .3s;
  box-shadow:0 8px 24px rgba(0,0,0,.3);pointer-events:none;white-space:nowrap;
  border:1px solid rgba(255,255,255,.1);
}
#toast.show{opacity:1;}

/* ===== PRINT STYLES ===== */
@media print{
  body{background:white!important;color:black!important;}
  .no-print{display:none!important;}
  .app-header{display:none!important;}
  .table-section{box-shadow:none!important;border:2px solid #000!important;}
  table{min-width:unset!important;}
  th{background:#e2e8f0!important;color:#000!important;}
  td{color:#000!important;}
  .total-row td{background:#1e293b!important;color:#fbbf24!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .print-header{display:block!important;}
}
.print-header{
  display:none;text-align:center;margin-bottom:20px;
  border-bottom:3px solid #1e40af;padding-bottom:15px;
}
.print-header h1{font-size:24px;color:#1e40af;font-weight:900;}
.print-header p{font-size:14px;color:#475569;}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .header-btns .hbtn span{display:none;}
  .hbtn{padding:7px 9px;}
  .entry-grid{grid-template-columns:repeat(3,1fr);}
  .action-bar .btn span{display:none;}
  .action-bar .btn{padding:10px;}
}
@media(max-width:400px){
  .entry-grid{grid-template-columns:repeat(2,1fr);}
}

/* ===== MISC ===== */
.divider{border:none;border-top:1px solid var(--border);margin:12px 0;}
.badge{
  display:inline-block;background:var(--danger);color:white;
  font-size:10px;font-weight:900;padding:1px 6px;border-radius:20px;
  margin-right:4px;vertical-align:middle;
}
</style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="login-page">
  <div class="stars" id="stars"></div>
  <div class="login-card">
    <div class="profile-ring">
      <img id="profile-photo" src="icon.jpg" alt="الكابتن سعيد"/>
    </div>
    <div class="app-title">منظومة الكابتن سعيد</div>
    <div class="app-sub">إدارة الحركات المالية</div>
    <div class="clock-row">
      <div class="analog-clock" style="width:120px;height:120px;border-width:5px;margin:0;box-shadow:0 0 20px rgba(251,191,36,.3);">
        <div class="clock-num n12" style="font-size:10px;top:5px;">12</div>
        <div class="clock-num n3" style="font-size:10px;right:5px;">3</div>
        <div class="clock-num n6" style="font-size:10px;bottom:5px;">6</div>
        <div class="clock-num n9" style="font-size:10px;left:5px;">9</div>
        <div id="h-hand" class="hand hour" style="height:30px;width:5px;"></div>
        <div id="m-hand" class="hand min" style="height:44px;width:3px;"></div>
        <div id="s-hand" class="hand sec" style="height:50px;width:2px;"></div>
        <div class="clock-dot"></div>
      </div>
      <div id="digital-time" class="clock-time" style="margin:0;font-size:22px;font-weight:900;color:#fbbf24;letter-spacing:3px;"></div>
    </div>
    <input type="password" id="passInput" placeholder="كلمة المرور..." autocomplete="off"/>
    <div id="login-err" style="color:#f87171;font-size:13px;margin-top:8px;min-height:18px;"></div>
    <button class="btn-login" onclick="login()">دخول ← </button>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="main-app">

  <!-- PRINT HEADER (hidden unless printing) -->
  <div class="print-header">
    <h1>منظومة الكابتن سعيد</h1>
    <p id="print-date"></p>
  </div>

  <!-- HEADER -->
  <header class="app-header no-print">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="icon.jpg" class="header-avatar" alt="ك.س"/>
      <div class="header-title">الكابتن سعيد</div>
    </div>
    <div class="header-btns">
      <button class="hbtn" onclick="toggleStats()" title="إحصائيات">📊 <span>إحصائيات</span></button>
      <button class="hbtn" onclick="toggleFullscreen()" id="fsBtn" title="ملء الشاشة">⛶ <span>ملء</span></button>
      <button class="hbtn" id="themeBtn" onclick="toggleTheme()" title="تغيير المظهر">🌙 <span>داكن</span></button>
      <button class="hbtn" onclick="logout()" title="خروج">⏻ <span>خروج</span></button>
    </div>
  </header>

  <div class="app-body">

    <!-- STATS (hidden by default) -->
    <div id="stats-section" class="stats-grid" style="display:none;"></div>

    <!-- ARCHIVE + SEARCH -->
    <section class="search-section no-print">
      <div class="search-row">
        <input type="text" id="saveName" placeholder="اسم الملف للحفظ..." style="flex:2;min-width:140px;"/>
        <button class="btn btn-green" onclick="saveToArchive()">💾 <span>حفظ</span></button>
        <input type="text" id="searchBox" placeholder="🔍 بحث في الأرشيف..." oninput="filterArchive()" style="flex:2;min-width:120px;"/>
        <button class="btn btn-purple" onclick="document.getElementById('importBackup').click()" title="استيراد نسخة احتياطية">📥 <span>نسخة</span></button>
        <input type="file" id="importBackup" accept=".json" style="display:none" onchange="importBackup(event)"/>
        <button class="btn btn-teal" onclick="exportBackup()" title="تصدير نسخة احتياطية">📤 <span>نسخة</span></button>
      </div>
      <div class="archive-list" id="archiveList"></div>
    </section>

    <!-- ENTRY FORM -->
    <section class="entry-section no-print">
      <div class="entry-grid">
        <div class="field">
          <label>عدد الحركات</label>
          <input type="number" id="f_count" oninput="autoCalc(this.value)" min="0"/>
        </div>
        <div class="field">
          <label>أمانات</label>
          <input type="number" id="f_a" min="0"/>
        </div>
        <div class="field">
          <label>ط.شهيد</label>
          <input type="number" id="f_s" min="0"/>
        </div>
        <div class="field">
          <label>ط.شرطة</label>
          <input type="number" id="f_p" min="0"/>
        </div>
        <div class="field">
          <label>مسنين</label>
          <input type="number" id="f_old" min="0"/>
        </div>
        <div class="field">
          <label>إعاقة</label>
          <input type="number" id="f_dis" min="0"/>
        </div>
        <div class="field">
          <label>ميكنة</label>
          <input type="number" id="f_m" value="35" readonly/>
        </div>
      </div>
      <div class="entry-btns">
        <button class="btn btn-green" onclick="saveToTable()">✚ إضافة (Enter)</button>
        <button class="btn btn-gray" onclick="clearForm()">✕ مسح النموذج</button>
        <button class="btn btn-orange" onclick="undoDelete()" id="undoBtn" style="display:none;">↩ تراجع</button>
      </div>
    </section>

    <!-- TABLE -->
    <div class="table-section">
      <div class="table-toolbar no-print">
        <div class="table-title">جدول الحركات <span class="badge" id="rowCount">0</span></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <input class="table-filter" type="text" id="tableFilter" placeholder="🔍 فلتر الجدول..." oninput="filterTable()"/>
          <button class="btn btn-sm btn-blue no-print" onclick="document.getElementById('importExcel').click()" title="استيراد Excel">📂 استيراد Excel</button>
          <input type="file" id="importExcel" accept=".xlsx,.xls" style="display:none" onchange="importFromExcel(event)"/>
        </div>
      </div>
      <div class="table-wrap">
        <table id="mainTable">
          <thead>
            <tr>
              <th style="width:42px">م</th>
              <th>عدد الحركات</th>
              <th>أمانات</th>
              <th>ط.شهيد</th>
              <th>ط.شرطة</th>
              <th>مسنين</th>
              <th>إعاقة</th>
              <th>ميكنة</th>
              <th class="no-print" style="width:70px">خيارات</th>
            </tr>
          </thead>
          <tbody id="fixedBody"></tbody>
          <tfoot>
            <tr class="total-row">
              <td colspan="2">الإجمالـي للملف الحالي</td>
              <td id="sum_a">0</td>
              <td id="sum_s">0</td>
              <td id="sum_p">0</td>
              <td id="sum_old">0</td>
              <td id="sum_dis">0</td>
              <td id="sum_m">0</td>
              <td class="no-print"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <!-- GRAND TOTAL -->
    <div class="grand-section">
      <div class="grand-title">📊 إجمالي كافة الملفات المحفوظة</div>
      <div class="grand-grid">
        <div class="grand-box"><label>مجموع الأمانات</label><span class="grand-val" id="grand_a">0</span></div>
        <div class="grand-box"><label>مجموع ط.شهيد</label><span class="grand-val" id="grand_s">0</span></div>
        <div class="grand-box"><label>مجموع ط.شرطة</label><span class="grand-val" id="grand_p">0</span></div>
        <div class="grand-box"><label>مجموع مسنين</label><span class="grand-val" id="grand_old">0</span></div>
        <div class="grand-box"><label>مجموع إعاقة</label><span class="grand-val" id="grand_dis">0</span></div>
        <div class="grand-box"><label>مجموع ميكنة</label><span class="grand-val" id="grand_m">0</span></div>
      </div>
    </div>

    <!-- ACTION BAR -->
    <div class="action-bar no-print">
      <button class="btn btn-blue" onclick="exportStyledExcel()">📊 <span>إكسيل منظم</span></button>
      <button class="btn btn-orange" onclick="exportPDF()">🖨️ <span>طباعة/PDF</span></button>
      <button class="btn btn-teal" onclick="shareData()">📤 <span>مشاركة</span></button>
      <button class="btn btn-red" onclick="confirmClear()">🗑️ <span>مسح الجدول</span></button>
    </div>

  </div><!-- /app-body -->
</div><!-- /main-app -->

<!-- OPTIONS MODAL -->
<div class="modal-overlay" id="optionsModal">
  <div class="modal">
    <h3 id="modalTitle">خيارات</h3>
    <div class="modal-btns">
      <button class="btn btn-blue" id="btnLoad">📂 تحميل للتعديل</button>
      <button class="btn btn-yellow" id="btnMarkFile">⭐ تصدير ملف Excel</button>
      <button class="btn btn-red" id="btnDeleteFile">🗑️ حذف الملف نهائياً</button>
      <button class="btn btn-gray" onclick="closeModal('optionsModal')">إلغاء ✕</button>
    </div>
  </div>
</div>

<!-- ROW OPTIONS MODAL -->
<div class="modal-overlay" id="rowModal">
  <div class="modal">
    <h3>خيارات الصف <span id="rowModalNum"></span></h3>
    <div class="modal-btns">
      <button class="btn btn-yellow" id="btnMarkRow">⭐ تمييز الصف (أصفر)</button>
      <button class="btn btn-red" id="btnDeleteRow">🗑️ حذف الصف</button>
      <button class="btn btn-gray" onclick="closeModal('rowModal')">إلغاء ✕</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3>⚠️ تأكيد</h3>
    <p id="confirmMsg" style="color:var(--text-muted);margin-bottom:20px;font-size:15px;"></p>
    <div class="modal-btns">
      <button class="btn btn-red" id="confirmOk">تأكيد</button>
      <button class="btn btn-gray" onclick="closeModal('confirmModal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ============================
// DATA
// ============================
const STORE_ROWS = 'cs_rows_v1';
const STORE_ARCH = 'cs_arch_v1';
const STORE_THEME = 'cs_theme';
const MECH_VAL = 35;
const ROW_COUNT = 30;

let rowsData = load(STORE_ROWS) || newRows();
let archive = load(STORE_ARCH) || {};
let selectedKey = '';
let selectedRowIdx = -1;
let lastDeleted = null;
let showStats = false;

function newRows(){return Array.from({length:ROW_COUNT},()=>({count:'',a:0,s:0,p:0,old:0,dis:0,m:0,marked:false}));}
function load(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

// ============================
// CLOCK & STARS
// ============================
function genStars(){
  const c = document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
    c.appendChild(s);
  }
}
function updateClock(){
  const n=new Date();
  const s=n.getSeconds()*6,m=n.getMinutes()*6+(n.getSeconds()*.1),h=(n.getHours()%12)*30+(n.getMinutes()*.5);
  document.getElementById('s-hand').style.transform=`rotate(${s}deg)`;
  document.getElementById('m-hand').style.transform=`rotate(${m}deg)`;
  document.getElementById('h-hand').style.transform=`rotate(${h}deg)`;
  const pad=x=>String(x).padStart(2,'0');
  document.getElementById('digital-time').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}
genStars();
setInterval(updateClock,1000);
updateClock();

// ============================
// THEME
// ============================
(function initTheme(){
  const t=localStorage.getItem(STORE_THEME)||'dark';
  setTheme(t,false);
})();
function setTheme(t,toast=true){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem(STORE_THEME,t);
  const btn=document.getElementById('themeBtn');
  if(btn) btn.innerHTML = t==='dark'?'☀️ <span>فاتح</span>':'🌙 <span>داكن</span>';
  if(toast) showToast(t==='dark'?'تم التفعيل: الوضع الداكن 🌙':'تم التفعيل: الوضع الفاتح ☀️');
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  setTheme(cur==='dark'?'light':'dark');
}

// ============================
// LOGIN / LOGOUT
// ============================
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    if(document.getElementById('login-page').style.display!=='none') login();
    else saveToTable();
  }
});
function login(){
  const v=document.getElementById('passInput').value;
  const err=document.getElementById('login-err');
  if(v==='123'){
    document.getElementById('login-page').style.display='none';
    document.getElementById('main-app').style.display='block';
    draw();renderArchive();updateGrand();
    err.textContent='';
  } else {
    err.textContent='❌ كلمة المرور غلط، حاول تاني!';
    document.getElementById('passInput').value='';
    document.getElementById('passInput').focus();
  }
}
function logout(){
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('passInput').value='';
  document.getElementById('passInput').focus();
}

// ============================
// FORM
// ============================
function autoCalc(v){
  if(!v){['f_a','f_s','f_p','f_old','f_dis'].forEach(id=>document.getElementById(id).value='');return;}
  const n=parseFloat(v)||0;
  document.getElementById('f_a').value=n*100;
  document.getElementById('f_s').value=n*5;
  document.getElementById('f_p').value=n*15;
  document.getElementById('f_old').value=n*5;
  document.getElementById('f_dis').value=n*5;
}
function clearForm(){
  ['f_count','f_a','f_s','f_p','f_old','f_dis'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f_count').focus();
}
function getFormVals(){
  return {
    count:document.getElementById('f_count').value||'',
    a:+document.getElementById('f_a').value||0,
    s:+document.getElementById('f_s').value||0,
    p:+document.getElementById('f_p').value||0,
    old:+document.getElementById('f_old').value||0,
    dis:+document.getElementById('f_dis').value||0,
    m:MECH_VAL,
    marked:false
  };
}
function saveToTable(){
  const v=document.getElementById('f_count').value;
  if(!v){showToast('⚠️ ادخل عدد الحركات أولاً');return;}
  const idx=rowsData.findIndex(r=>r.count===''||r.count===null||r.count===undefined);
  if(idx===-1){showToast('⚠️ الجدول ممتلئ! احفظ الملف أولاً');return;}
  rowsData[idx]=getFormVals();
  draw();clearForm();
  const el=document.getElementById(`row-${idx}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  showToast('✅ تمت الإضافة بنجاح');
}

// ============================
// TABLE
// ============================
function draw(){
  const body=document.getElementById('fixedBody');
  const filter=(document.getElementById('tableFilter')||{}).value||'';
  body.innerHTML='';
  rowsData.forEach((row,i)=>{
    const hidden=filter&&!String(row.count).includes(filter)?'hidden-row':'';
    const marked=row.marked?'marked':'';
    body.innerHTML+=`<tr id="row-${i}" class="${hidden} ${marked}">
      <td class="num-cell">${i+1}</td>
      <td contenteditable="true" class="cell-edit" onblur="update(${i},'count',this.innerText)">${row.count||''}</td>
      <td contenteditable="true" class="cell-edit" onblur="update(${i},'a',this.innerText)">${row.a||''}</td>
      <td contenteditable="true" class="cell-edit" onblur="update(${i},'s',this.innerText)">${row.s||''}</td>
      <td contenteditable="true" class="cell-edit" onblur="update(${i},'p',this.innerText)">${row.p||''}</td>
      <td contenteditable="true" class="cell-edit" onblur="update(${i},'old',this.innerText)">${row.old||''}</td>
      <td contenteditable="true" class="cell-edit" onblur="update(${i},'dis',this.innerText)">${row.dis||''}</td>
      <td contenteditable="true" class="cell-edit" onblur="update(${i},'m',this.innerText)">${row.m||''}</td>
      <td class="no-print"><div class="row-actions">
        <button class="row-btn" onclick="openRowModal(${i})" title="خيارات الصف">⋮</button>
      </div></td>
    </tr>`;
  });
  calc();
  save(STORE_ROWS,rowsData);
  const filled=rowsData.filter(r=>r.count!==''&&r.count!==null&&r.count!==undefined).length;
  const badge=document.getElementById('rowCount');
  if(badge) badge.textContent=filled;
  updateStats(filled);
}
function update(idx,f,v){
  rowsData[idx][f]=f==='count'?v:Number(v)||0;
  calc();save(STORE_ROWS,rowsData);
}
function filterTable(){draw();}
function calc(){
  const t=rowsData.reduce((acc,c)=>{
    acc.a+=+(c.a||0);acc.s+=+(c.s||0);acc.p+=+(c.p||0);
    acc.old+=+(c.old||0);acc.dis+=+(c.dis||0);acc.m+=+(c.m||0);
    return acc;
  },{a:0,s:0,p:0,old:0,dis:0,m:0});
  for(const k in t) {const el=document.getElementById('sum_'+k);if(el)el.textContent=t[k];}
}

// ============================
// ROW OPTIONS
// ============================
function openRowModal(idx){
  selectedRowIdx=idx;
  document.getElementById('rowModalNum').textContent='#'+(idx+1);
  document.getElementById('btnMarkRow').textContent=rowsData[idx].marked?'✕ إلغاء التمييز':'⭐ تمييز الصف (أصفر)';
  openModal('rowModal');
}
document.getElementById('btnMarkRow').onclick=function(){
  if(selectedRowIdx<0) return;
  rowsData[selectedRowIdx].marked=!rowsData[selectedRowIdx].marked;
  draw();closeModal('rowModal');
  showToast(rowsData[selectedRowIdx].marked?'⭐ تم تمييز الصف':'تم إلغاء التمييز');
};
document.getElementById('btnDeleteRow').onclick=function(){
  if(selectedRowIdx<0) return;
  lastDeleted={row:JSON.parse(JSON.stringify(rowsData[selectedRowIdx])),idx:selectedRowIdx};
  rowsData[selectedRowIdx]={count:'',a:0,s:0,p:0,old:0,dis:0,m:0,marked:false};
  draw();closeModal('rowModal');
  document.getElementById('undoBtn').style.display='inline-flex';
  showToast('🗑️ تم حذف الصف - اضغط تراجع للاسترجاع');
};
function undoDelete(){
  if(!lastDeleted) return;
  rowsData[lastDeleted.idx]=lastDeleted.row;
  draw();lastDeleted=null;
  document.getElementById('undoBtn').style.display='none';
  showToast('↩ تم استرجاع الصف');
}

// ============================
// ARCHIVE
// ============================
function saveToArchive(){
  const n=document.getElementById('saveName').value.trim();
  if(!n){showToast('⚠️ ادخل اسم الملف أولاً');return;}
  const filled=rowsData.filter(r=>r.count!==''&&r.count!=null).length;
  if(filled===0){showToast('⚠️ لا توجد بيانات للحفظ');return;}
  archive[n]={rows:JSON.parse(JSON.stringify(rowsData)),date:new Date().toLocaleDateString('ar-EG'),time:new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})};
  save(STORE_ARCH,archive);
  clearTableData();renderArchive();updateGrand();
  document.getElementById('saveName').value='';
  showToast('✅ تم حفظ الملف وتصفير الجدول');
}
function renderArchive(f=''){
  const list=document.getElementById('archiveList');
  list.innerHTML='';
  const keys=Object.keys(archive).filter(k=>k.includes(f));
  if(keys.length===0){list.innerHTML='<span style="color:var(--text-muted);font-size:13px;">لا توجد ملفات محفوظة</span>';return;}
  keys.forEach(k=>{
    const item=archive[k];
    const date=item.date||'';const time=item.time||'';
    const d=document.createElement('div');
    d.className='arch-item';
    d.innerHTML=`<span>📁 ${k}<span class="arch-date">${date} ${time}</span></span>
      <button class="arch-del" title="حذف" onclick="event.stopPropagation();quickDelete('${k}')">✕</button>`;
    d.onclick=()=>{selectedKey=k;document.getElementById('modalTitle').textContent=k;openModal('optionsModal');};
    list.appendChild(d);
  });
}
function quickDelete(k){
  showConfirm(`هل تريد حذف ملف "${k}" نهائياً؟`,()=>{
    delete archive[k];save(STORE_ARCH,archive);renderArchive();updateGrand();showToast('🗑️ تم حذف الملف');
  });
}
function filterArchive(){renderArchive(document.getElementById('searchBox').value);}

document.getElementById('btnLoad').onclick=function(){
  if(!selectedKey||!archive[selectedKey]) return;
  const a=archive[selectedKey];
  rowsData=JSON.parse(JSON.stringify(a.rows||a));
  draw();closeModal('optionsModal');window.scrollTo(0,0);
  showToast('📂 تم تحميل الملف: '+selectedKey);
};
document.getElementById('btnDeleteFile').onclick=function(){
  showConfirm(`هل تريد حذف ملف "${selectedKey}" نهائياً؟`,()=>{
    delete archive[selectedKey];save(STORE_ARCH,archive);
    renderArchive();updateGrand();closeModal('optionsModal');
    showToast('🗑️ تم حذف الملف');
  });
};
document.getElementById('btnMarkFile').onclick=function(){
  if(!selectedKey) return;
  closeModal('optionsModal');
  exportSingleArchiveExcel(selectedKey);
};

// ============================
// GRAND TOTAL
// ============================
function updateGrand(){
  const g={a:0,s:0,p:0,old:0,dis:0,m:0};
  Object.values(archive).forEach(item=>{
    const rows=item.rows||item;
    rows.forEach(r=>{
      g.a+=+(r.a||0);g.s+=+(r.s||0);g.p+=+(r.p||0);
      g.old+=+(r.old||0);g.dis+=+(r.dis||0);g.m+=+(r.m||0);
    });
  });
  for(const k in g){const el=document.getElementById('grand_'+k);if(el)el.textContent=g[k];}
}

// ============================
// STATS
// ============================
function updateStats(filled){
  if(!showStats) return;
  const totA=+(document.getElementById('sum_a')||{textContent:0}).textContent||0;
  const totS=+(document.getElementById('sum_s')||{textContent:0}).textContent||0;
  const totP=+(document.getElementById('sum_p')||{textContent:0}).textContent||0;
  const s=document.getElementById('stats-section');
  if(!s) return;
  s.innerHTML=`
    <div class="stat-card"><div class="stat-num">${filled}</div><div class="stat-label">صفوف مملوءة</div></div>
    <div class="stat-card"><div class="stat-num">${ROW_COUNT-filled}</div><div class="stat-label">صفوف فارغة</div></div>
    <div class="stat-card"><div class="stat-num">${Object.keys(archive).length}</div><div class="stat-label">ملفات محفوظة</div></div>
    <div class="stat-card"><div class="stat-num">${totA}</div><div class="stat-label">إجمالي الأمانات</div></div>
    <div class="stat-card"><div class="stat-num">${totS}</div><div class="stat-label">إجمالي ط.شهيد</div></div>
    <div class="stat-card"><div class="stat-num">${totP}</div><div class="stat-label">إجمالي ط.شرطة</div></div>
  `;
}
function toggleStats(){
  showStats=!showStats;
  const s=document.getElementById('stats-section');
  s.style.display=showStats?'grid':'none';
  if(showStats){const filled=rowsData.filter(r=>r.count!==''&&r.count!=null).length;updateStats(filled);}
  showToast(showStats?'📊 تم تفعيل الإحصائيات':'تم إخفاء الإحصائيات');
}

// ============================
// CLEAR
// ============================
function clearTableData(){
  rowsData=newRows();draw();lastDeleted=null;
  document.getElementById('undoBtn').style.display='none';
}
function confirmClear(){
  showConfirm('هل تريد مسح كل بيانات الجدول الحالي؟',()=>{
    clearTableData();showToast('🗑️ تم مسح الجدول');
  });
}

// ============================
// EXCEL EXPORT (STYLED)
// ============================
function exportStyledExcel(){
  if(!window.XLSX){showToast('⚠️ مكتبة Excel غير محملة');return;}
  const cols=['م','عدد الحركات','أمانات','ط.شهيد','ط.شرطة','مسنين','إعاقة','ميكنة'];
  const data=[cols];
  rowsData.forEach((r,i)=>{
    if(r.count!==''&&r.count!=null)
      data.push([i+1,r.count,r.a,r.s,r.p,r.old,r.dis,r.m]);
  });
  const t=rowsData.reduce((a,c)=>({a:a.a+(+c.a||0),s:a.s+(+c.s||0),p:a.p+(+c.p||0),old:a.old+(+c.old||0),dis:a.dis+(+c.dis||0),m:a.m+(+c.m||0)}),{a:0,s:0,p:0,old:0,dis:0,m:0});
  data.push(['الإجمالي','',t.a,t.s,t.p,t.old,t.dis,t.m]);
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:5},{wch:15},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'الحركات');
  XLSX.writeFile(wb,`الكابتن_سعيد_${new Date().toLocaleDateString('ar-EG').replace(/\//g,'-')}.xlsx`);
  showToast('✅ تم تصدير ملف Excel');
}
function exportSingleArchiveExcel(key){
  if(!window.XLSX) return;
  const item=archive[key];const rows=item.rows||item;
  const cols=['م','عدد الحركات','أمانات','ط.شهيد','ط.شرطة','مسنين','إعاقة','ميكنة'];
  const data=[[`ملف: ${key} | التاريخ: ${item.date||''}`],[],cols];
  rows.forEach((r,i)=>{
    if(r.count!==''&&r.count!=null) data.push([i+1,r.count,r.a,r.s,r.p,r.old,r.dis,r.m]);
  });
  const t=rows.reduce((a,c)=>({a:a.a+(+c.a||0),s:a.s+(+c.s||0),p:a.p+(+c.p||0),old:a.old+(+c.old||0),dis:a.dis+(+c.dis||0),m:a.m+(+c.m||0)}),{a:0,s:0,p:0,old:0,dis:0,m:0});
  data.push(['الإجمالي','',t.a,t.s,t.p,t.old,t.dis,t.m]);
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:5},{wch:15},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,key.substring(0,30));
  XLSX.writeFile(wb,`${key}.xlsx`);
  showToast('✅ تم تصدير ملف: '+key);
}

// ============================
// IMPORT EXCEL
// ============================
function importFromExcel(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let startRow=0;
      if(data[0]&&isNaN(data[0][0])) startRow=1;
      let idx=rowsData.findIndex(r=>r.count===''||r.count==null);
      for(let i=startRow;i<data.length;i++){
        if(idx>=ROW_COUNT) break;
        const row=data[i];
        const count=row[1]||row[0];
        if(!count) continue;
        rowsData[idx]={count:String(count),a:+row[2]||0,s:+row[3]||0,p:+row[4]||0,old:+row[5]||0,dis:+row[6]||0,m:MECH_VAL,marked:false};
        idx++;
      }
      draw();showToast('✅ تم استيراد ملف Excel');
    } catch(err){showToast('❌ خطأ في قراءة الملف');}
  };
  reader.readAsBinaryString(file);
  e.target.value='';
}

// ============================
// PDF / PRINT
// ============================
function exportPDF(){
  document.getElementById('print-date').textContent=`تاريخ الطباعة: ${new Date().toLocaleDateString('ar-EG')} - الساعة ${new Date().toLocaleTimeString('ar-EG')}`;
  window.print();
}

// ============================
// SHARE
// ============================
function shareData(){
  const t=rowsData.reduce((a,c)=>({a:a.a+(+c.a||0),s:a.s+(+c.s||0),p:a.p+(+c.p||0),old:a.old+(+c.old||0),dis:a.dis+(+c.dis||0),m:a.m+(+c.m||0)}),{a:0,s:0,p:0,old:0,dis:0,m:0});
  const filled=rowsData.filter(r=>r.count!==''&&r.count!=null).length;
  const text=`📋 منظومة الكابتن سعيد\n📅 ${new Date().toLocaleDateString('ar-EG')}\n\n`+
    `عدد الصفوف: ${filled}\nالأمانات: ${t.a}\nط.شهيد: ${t.s}\nط.شرطة: ${t.p}\nمسنين: ${t.old}\nإعاقة: ${t.dis}\nميكنة: ${t.m}`;
  if(navigator.share){navigator.share({title:'منظومة الكابتن سعيد',text}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>showToast('✅ تم نسخ البيانات'));}
  else showToast('⚠️ المشاركة غير مدعومة في هذا المتصفح');
}

// ============================
// BACKUP
// ============================
function exportBackup(){
  const data=JSON.stringify({rows:rowsData,archive,exported:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`نسخة_احتياطية_${new Date().toLocaleDateString('ar-EG').replace(/\//g,'-')}.json`;
  a.click();
  showToast('✅ تم تصدير النسخة الاحتياطية');
}
function importBackup(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      showConfirm('سيتم استبدال كل البيانات الحالية بالنسخة الاحتياطية. متأكد؟',()=>{
        if(data.rows) rowsData=data.rows;
        if(data.archive) archive=data.archive;
        save(STORE_ROWS,rowsData);save(STORE_ARCH,archive);
        draw();renderArchive();updateGrand();
        showToast('✅ تم استيراد النسخة الاحتياطية بنجاح');
      });
    } catch{showToast('❌ ملف غير صالح');}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ============================
// FULLSCREEN
// ============================
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().then(()=>{
      document.getElementById('fsBtn').innerHTML='✕ <span>خروج</span>';
      showToast('⛶ ملء الشاشة مفعّل');
    }).catch(()=>{});
  } else {
    document.exitFullscreen().then(()=>{
      document.getElementById('fsBtn').innerHTML='⛶ <span>ملء</span>';
      showToast('نافذة عادية');
    });
  }
}

// ============================
// MODAL HELPERS
// ============================
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',function(e){if(e.target===this) this.classList.remove('show');});
});

let confirmCb=null;
function showConfirm(msg,cb){
  document.getElementById('confirmMsg').textContent=msg;
  confirmCb=cb;openModal('confirmModal');
}
document.getElementById('confirmOk').onclick=function(){
  closeModal('confirmModal');if(confirmCb) confirmCb();confirmCb=null;
};

// ============================
// TOAST
// ============================
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

// ============================
// PWA
// ============================
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// ============================
// INIT
// ============================
draw();
</script>
